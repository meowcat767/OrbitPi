name: Build and Release JMonkeyEngine Game on Commit

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for Gradle (Linux)
      if: runner.os == 'Linux'
      run: chmod +x gradlew

    - name: Build with Gradle (Linux)
      if: runner.os == 'Linux'
      run: ./gradlew clean build

    - name: Build with Gradle (Windows)
      if: runner.os == 'Windows'
      run: gradlew.bat clean build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jme-game-${{ runner.os }}
        path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts from build
      uses: actions/download-artifact@v4
      with:
        name: jme-game-ubuntu-latest
        path: release/
    - uses: actions/download-artifact@v4
      with:
        name: jme-game-windows-latest
        path: release/

    - name: Create or Update “latest” GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: latest
        name: Latest Build
        body: Automated build from commit ${{ github.sha }}
        files: release/**/*.jar
        draft: false
        prerelease: false
        overwrite: true
