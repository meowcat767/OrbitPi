name: Build and Release JME Game

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual triggering

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Java 17 (compatible with JME)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Cache Gradle + JitPack dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/jitpack
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # Pre-fetch dependencies (avoids long stalls)
      - name: Pre-fetch Gradle dependencies
        run: ./gradlew --refresh-dependencies --console=plain --info

      # Build the game
      - name: Build game
        run: ./gradlew clean build --console=plain --info

      # Zip the build output
      - name: Package build
        run: |
          mkdir -p release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell Compress-Archive -Path build/libs/* -DestinationPath release/game-windows.zip
          else
            zip -r release/game-linux.zip build/libs/*
          fi

      # Create GitHub release with artifacts (on push to main)
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: JME Game v${{ github.run_number }}
          body: "Automated release of JMonkeyEngine game build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts to release
      - name: Upload Release Assets
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
